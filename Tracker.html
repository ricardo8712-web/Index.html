<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>SoCal Shine Co. — Prospects</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #020617; font-family: 'DM Sans', sans-serif; }
  select, input, button { font-family: 'DM Sans', sans-serif; }
  ::-webkit-scrollbar { display: none; }
</style>

<body>
<div id="root"></div>
<script type="text/babel">

const STATUS_OPTIONS = [“Not Contacted”,“Texted”,“Responded”,“Not Interested”,“Interested”,“Paying Client”];
const STATUS_COLORS = {
“Not Contacted”: { bg:”#1e293b”, text:”#94a3b8”, dot:”#475569” },
“Texted”:        { bg:”#1e3a5f”, text:”#7dd3fc”, dot:”#38bdf8” },
“Responded”:     { bg:”#1e3a2f”, text:”#6ee7b7”, dot:”#34d399” },
“Not Interested”:{ bg:”#3b1e1e”, text:”#fca5a5”, dot:”#f87171” },
“Interested”:    { bg:”#2d2a1e”, text:”#fde68a”, dot:”#fbbf24” },
“Paying Client”: { bg:”#1a2e1a”, text:”#86efac”, dot:”#22c55e” },
};

const STORAGE_KEY = “socal_prospects_v1”;

const INITIAL_PROSPECTS = [
{ id:1,  name:“Works Pressure Washing”,              source:“Yelp”,       reviews:7,    contact:“310-344-8104”, status:“Not Contacted”, date:””, notes:”” },
{ id:2,  name:“United Pressure Systems”,             source:“Apple Maps”, reviews:8,    contact:””,            status:“Not Contacted”, date:””, notes:”” },
{ id:3,  name:“Paver Wash”,                          source:“Apple Maps”, reviews:15,   contact:””,            status:“Not Contacted”, date:””, notes:”” },
{ id:4,  name:“Cleaning Time Exterior Pressure Wash”,source:“Apple Maps”, reviews:4,    contact:””,            status:“Not Contacted”, date:””, notes:”” },
{ id:5,  name:“Fountain Pressure Washing”,           source:“Other”,      reviews:null, contact:“323-479-2797”,status:“Not Contacted”, date:””, notes:”” },
{ id:6,  name:“Luxe Power Wash”,                     source:“Yelp”,       reviews:2,    contact:””,            status:“Not Contacted”, date:””, notes:”” },
{ id:7,  name:“Splash & Dash Power Wash”,            source:“Craigslist”, reviews:null, contact:””,            status:“Not Contacted”, date:””, notes:”” },
{ id:8,  name:“Pure Wash”,                           source:“Apple Maps”, reviews:1,    contact:””,            status:“Not Contacted”, date:””, notes:”” },
{ id:9,  name:“PPM Power Wash”,                      source:“Apple Maps”, reviews:1,    contact:””,            status:“Not Contacted”, date:””, notes:”” },
];

function load() {
try { const d = localStorage.getItem(STORAGE_KEY); return d ? JSON.parse(d) : INITIAL_PROSPECTS; }
catch { return INITIAL_PROSPECTS; }
}
function save(data) {
try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch {}
}

const labelStyle = { display:“block”, color:”#64748b”, fontSize:11, fontWeight:600, textTransform:“uppercase”, letterSpacing:1, marginBottom:4 };
const inputStyle = { width:“100%”, background:”#1e293b”, border:“1px solid #334155”, borderRadius:8, padding:“8px 10px”, color:”#f1f5f9”, fontSize:14 };
const btnStyle = (bg, border) => ({ background:bg, border:`1px solid ${border}`, color:border, borderRadius:8, padding:“8px 16px”, fontSize:13, fontWeight:600, cursor:“pointer”, marginTop:4 });

function StatusBadge({ status }) {
const c = STATUS_COLORS[status];
return (
<span style={{ display:“inline-flex”, alignItems:“center”, gap:5, background:c.bg, color:c.text, padding:“3px 10px”, borderRadius:20, fontSize:11, fontWeight:600, border:`1px solid ${c.dot}40`, whiteSpace:“nowrap” }}>
<span style={{ width:6, height:6, borderRadius:“50%”, background:c.dot, display:“inline-block” }} />
{status}
</span>
);
}

function Field({ label, value, onChange, placeholder }) {
return (
<div>
<label style={labelStyle}>{label}</label>
<input value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder} style={inputStyle} />
</div>
);
}

function Row({ label, value }) {
return (
<div style={{ marginBottom:8 }}>
<span style={{ color:”#475569”, fontSize:11, fontWeight:600, textTransform:“uppercase”, letterSpacing:1 }}>{label}: </span>
<span style={{ color:”#cbd5e1”, fontSize:13 }}>{value}</span>
</div>
);
}

function ProspectCard({ prospect, onUpdate }) {
const [expanded, setExpanded] = React.useState(false);
const [editing, setEditing] = React.useState(false);
const [form, setForm] = React.useState({ …prospect });

const save = () => { onUpdate(form); setEditing(false); };

return (
<div style={{ background:”#0f172a”, border:`1px solid ${expanded ? "#334155" : "#1e293b"}`, borderRadius:14, marginBottom:10, overflow:“hidden” }}>
<div onClick={() => setExpanded(!expanded)} style={{ padding:“14px 16px”, cursor:“pointer”, display:“flex”, justifyContent:“space-between”, alignItems:“flex-start”, gap:10 }}>
<div style={{ flex:1, minWidth:0 }}>
<div style={{ fontWeight:700, fontSize:14, color:”#f1f5f9”, marginBottom:4, whiteSpace:“nowrap”, overflow:“hidden”, textOverflow:“ellipsis” }}>{prospect.name}</div>
<div style={{ display:“flex”, gap:8, flexWrap:“wrap”, alignItems:“center” }}>
<span style={{ fontSize:11, color:”#64748b” }}>{prospect.source}</span>
{prospect.reviews !== null && <span style={{ fontSize:11, color:”#64748b” }}>⭐ {prospect.reviews} reviews</span>}
</div>
</div>
<div style={{ display:“flex”, flexDirection:“column”, alignItems:“flex-end”, gap:6, flexShrink:0 }}>
<StatusBadge status={prospect.status} />
<span style={{ color:”#475569”, fontSize:12 }}>{expanded ? “▲” : “▼”}</span>
</div>
</div>

```
  {expanded && (
    <div style={{ padding:"0 16px 16px", borderTop:"1px solid #1e293b" }}>
      {!editing ? (
        <div style={{ paddingTop:12 }}>
          <Row label="Contact" value={prospect.contact || "—"} />
          <Row label="Date Texted" value={prospect.date || "—"} />
          <Row label="Notes" value={prospect.notes || "—"} />

      ) : (
        <div style={{ paddingTop:12, display:"flex", flexDirection:"column", gap:10 }}>
          <Field label="Contact" value={form.contact} onChange={v => setForm({...form, contact:v})} placeholder="Phone or website" />
          <Field label="Date Texted" value={form.date} onChange={v => setForm({...form, date:v})} placeholder="e.g. Apr 14" />
          <Field label="Notes" value={form.notes} onChange={v => setForm({...form, notes:v})} placeholder="Any notes..." />
          <div>
            <label style={labelStyle}>Status</label>
            <select value={form.status} onChange={e => setForm({...form, status:e.target.value})} style={{ ...inputStyle, WebkitAppearance:"none" }}>
              {STATUS_OPTIONS.map(s => <option key={s} value={s}>{s}</option>)}
            </select>
          </div>
          <div style={{ display:"flex", gap:8 }}>
            <button onClick={save} style={btnStyle("#166534","#22c55e")}>Save</button>
            <button onClick={() => setEditing(false)} style={btnStyle("#1e293b","#64748b")}>Cancel</button>
          </div>
        </div>
      )}
    </div>
  )}
</div>

);
}

function App() {
const [prospects, setProspects] = React.useState(load);
const [filter, setFilter] = React.useState(“All”);
const [showAdd, setShowAdd] = React.useState(false);
const [newForm, setNewForm] = React.useState({ name:””, source:””, reviews:””, contact:””, status:“Not Contacted”, date:””, notes:”” });

const update = (updated) => {
const next = prospects.map(p => p.id === updated.id ? updated : p);
setProspects(next); save(next);
};

const addProspect = () => {
if (!newForm.name.trim()) return;
const next = […prospects, { …newForm, id:Date.now(), reviews: newForm.reviews !== “” ? parseInt(newForm.reviews) : null }];
setProspects(next); save(next);
setNewForm({ name:””, source:””, reviews:””, contact:””, status:“Not Contacted”, date:””, notes:”” });
setShowAdd(false);
};

const counts = STATUS_OPTIONS.reduce((acc, s) => { acc[s] = prospects.filter(p => p.status === s).length; return acc; }, {});
const filtered = filter === “All” ? prospects : prospects.filter(p => p.status === filter);

return (
<div style={{ background:”#020617”, minHeight:“100vh”, padding:“24px 16px 60px” }}>
<div style={{ maxWidth:480, margin:“0 auto” }}>

```
    <div style={{ marginBottom:20 }}>
      <div style={{ fontFamily:"'Bebas Neue', sans-serif", fontSize:28, color:"#38bdf8", letterSpacing:2 }}>SOCAL SHINE CO.</div>
      <div style={{ color:"#475569", fontSize:13 }}>Prospect Tracker · {prospects.length} businesses</div>
    </div>

    <div style={{ display:"flex", gap:6, flexWrap:"wrap", marginBottom:16 }}>
      {["Texted","Interested","Paying Client"].map(s => (
        <div key={s} style={{ background:STATUS_COLORS[s].bg, border:`1px solid ${STATUS_COLORS[s].dot}40`, borderRadius:10, padding:"5px 12px", fontSize:11, color:STATUS_COLORS[s].text, fontWeight:600 }}>
          {counts[s]} {s}
        </div>
      ))}
    </div>

    <div style={{ display:"flex", gap:6, flexWrap:"wrap", marginBottom:16 }}>
      {["All",...STATUS_OPTIONS].map(s => (
        <button key={s} onClick={() => setFilter(s)} style={{ background:filter===s?"#1e40af":"#0f172a", border:`1px solid ${filter===s?"#3b82f6":"#1e293b"}`, color:filter===s?"#93c5fd":"#64748b", borderRadius:20, padding:"5px 12px", fontSize:11, fontWeight:600, cursor:"pointer" }}>
          {s}
        </button>
      ))}
    </div>

    {filtered.map(p => <ProspectCard key={p.id} prospect={p} onUpdate={update} />)}

    {!showAdd ? (
      <button onClick={() => setShowAdd(true)} style={{ width:"100%", background:"#0f172a", border:"1px dashed #334155", color:"#475569", borderRadius:14, padding:14, fontSize:14, fontWeight:600, cursor:"pointer", marginTop:4 }}>
        + Add Prospect
      </button>
    ) : (
      <div style={{ background:"#0f172a", border:"1px solid #334155", borderRadius:14, padding:16, marginTop:4, display:"flex", flexDirection:"column", gap:10 }}>
        <div style={{ fontWeight:700, color:"#f1f5f9", marginBottom:4 }}>New Prospect</div>
        <Field label="Business Name *" value={newForm.name} onChange={v => setNewForm({...newForm, name:v})} placeholder="e.g. Sunshine Pressure Wash" />
        <Field label="Source" value={newForm.source} onChange={v => setNewForm({...newForm, source:v})} placeholder="Yelp, Google, Apple Maps..." />
        <Field label="Reviews" value={newForm.reviews} onChange={v => setNewForm({...newForm, reviews:v})} placeholder="Number of reviews" />
        <Field label="Contact" value={newForm.contact} onChange={v => setNewForm({...newForm, contact:v})} placeholder="Phone or website" />
        <div style={{ display:"flex", gap:8 }}>
          <button onClick={addProspect} style={btnStyle("#166534","#22c55e")}>Add</button>
          <button onClick={() => setShowAdd(false)} style={btnStyle("#1e293b","#64748b")}>Cancel</button>
        </div>
      </div>
    )}
  </div>
</div>

);
}

ReactDOM.createRoot(document.getElementById(“root”)).render(<App />);
</script>

</body>
</html>
