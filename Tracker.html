<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>SoCal Shine Co. — Prospects</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#020617;font-family:'DM Sans',sans-serif;padding:24px 16px 80px;color:#f1f5f9}
h1{font-family:'Bebas Neue',sans-serif;font-size:28px;color:#38bdf8;letter-spacing:2px}
.sub{color:#475569;font-size:13px;margin-bottom:16px}
.pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.pill{padding:5px 12px;border-radius:20px;font-size:11px;font-weight:700;border:1px solid}
.filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.filter-btn{padding:5px 12px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid #1e293b;background:#0f172a;color:#64748b}
.filter-btn.active{background:#1e40af;border-color:#3b82f6;color:#93c5fd}
.card{background:#0f172a;border:1px solid #1e293b;border-radius:14px;margin-bottom:10px;overflow:hidden}
.card.starred{border-color:#fbbf2460}
.card-header{padding:14px 16px;display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.card-header-left{flex:1;min-width:0;cursor:pointer}
.card-name{font-weight:700;font-size:14px;color:#f1f5f9;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-meta{font-size:11px;color:#64748b}
.card-header-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0}
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap;border:1px solid}
.dot{width:6px;height:6px;border-radius:50%;display:inline-block}
.star-btn{background:none;border:none;font-size:18px;cursor:pointer;padding:0;line-height:1;-webkit-tap-highlight-color:transparent}
.arrow{color:#475569;font-size:12px;cursor:pointer}
.card-body{padding:0 16px 16px;border-top:1px solid #1e293b;display:none}
.card-body.open{display:block}
.quick-status{display:flex;gap:6px;flex-wrap:wrap;margin:12px 0 4px}
.qs-btn{padding:6px 10px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid;white-space:nowrap;-webkit-tap-highlight-color:transparent}
.qs-btn.active-status{opacity:1}
.qs-btn:not(.active-status){opacity:0.4}
.action-btns{display:flex;gap:8px;margin:10px 0}
.action-btn{flex:1;padding:10px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;text-align:center;text-decoration:none;display:block}
.btn-call{background:#1e3a2f;color:#6ee7b7;border:1px solid #34d39940}
.btn-sms{background:#1e3a5f;color:#7dd3fc;border:1px solid #38bdf840}
.btn-copy{background:#2d1e3a;color:#c084fc;border:1px solid #a855f740;width:100%;padding:10px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;text-align:center;margin-bottom:10px;font-family:'DM Sans',sans-serif;-webkit-tap-highlight-color:transparent}
.row{margin-bottom:8px}
.row-label{color:#475569;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px}
.row-val{color:#cbd5e1;font-size:13px}
label{display:block;color:#64748b;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;margin-top:10px}
input,select{width:100%;background:#1e293b;border:1px solid #334155;border-radius:8px;padding:8px 10px;color:#f1f5f9;font-size:14px;font-family:'DM Sans',sans-serif;-webkit-appearance:none}
input[type="date"]{color:#f1f5f9}
.btn{border-radius:8px;padding:10px 16px;font-size:13px;font-weight:600;cursor:pointer;margin-top:8px;margin-right:8px;font-family:'DM Sans',sans-serif;-webkit-tap-highlight-color:transparent}
.btn-blue{background:#1e40af;border:1px solid #3b82f6;color:#93c5fd}
.btn-green{background:#166534;border:1px solid #22c55e;color:#86efac}
.btn-gray{background:#1e293b;border:1px solid #64748b;color:#94a3b8}
.btn-red{background:#3b1e1e;border:1px solid #f87171;color:#fca5a5}
.edit-actions{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
.add-btn{width:100%;background:#0f172a;border:1px dashed #334155;color:#475569;border-radius:14px;padding:14px;font-size:14px;font-weight:600;cursor:pointer;margin-top:4px;font-family:'DM Sans',sans-serif}
.add-form{background:#0f172a;border:1px solid #334155;border-radius:14px;padding:16px;margin-top:4px}
.hidden{display:none!important}
.fu-tag{display:inline-block;border-radius:8px;font-size:11px;font-weight:600;padding:3px 8px;margin-top:5px}
.fu-normal{background:#2d1e3a;color:#c084fc;border:1px solid #a855f740}
.fu-overdue{background:#3b1e1e;color:#fca5a5;border:1px solid #f8717140}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#1e293b;color:#f1f5f9;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;border:1px solid #334155;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:100;white-space:nowrap}
.toast.show{opacity:1}

/* Fixed bottom sheet for delete — avoids z-index Safari bug */
.sheet-backdrop{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:200;display:flex;align-items:flex-end;justify-content:center;-webkit-tap-highlight-color:transparent}
.sheet{background:#0f172a;border:1px solid #334155;border-radius:20px 20px 0 0;padding:28px 20px 48px;width:100%;max-width:500px}
.sheet p{color:#e2e8f0;font-size:16px;font-weight:600;text-align:center;margin-bottom:20px}
.sheet-btn{display:block;width:100%;padding:14px;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;text-align:center;font-family:‘DM Sans’,sans-serif;margin-bottom:10px;border:none;-webkit-tap-highlight-color:transparent}
.sheet-delete{background:#7f1d1d;color:#fca5a5}
.sheet-cancel{background:#1e293b;color:#94a3b8}
</style>

</head>
<body>

<h1>SOCAL SHINE CO.</h1>
<div class="sub" id="subtext">Prospect Tracker · 0 businesses</div>

<div class="pills">
  <div class="pill" id="pill-texted" style="background:#1e3a5f;color:#7dd3fc;border-color:#38bdf840">0 Texted</div>
  <div class="pill" id="pill-interested" style="background:#2d2a1e;color:#fde68a;border-color:#fbbf2440">0 Interested</div>
  <div class="pill" id="pill-paying" style="background:#1a2e1a;color:#86efac;border-color:#22c55e40">0 Paying Client</div>
</div>

<div class="filters" id="filters"></div>
<div id="list"></div>

<button class="add-btn" onclick="toggleAddForm()">+ Add Prospect</button>

<div class="add-form hidden" id="add-form">
  <div style="font-weight:700;color:#f1f5f9;margin-bottom:8px">New Prospect</div>
  <label>Business Name *</label>
  <input id="new-name" placeholder="e.g. Sunshine Pressure Wash"/>
  <label>Source</label>
  <input id="new-source" placeholder="Yelp, Google, Apple Maps..."/>
  <label>Reviews</label>
  <input id="new-reviews" type="number" placeholder="Number of reviews"/>
  <label>Contact (phone number)</label>
  <input id="new-contact" type="tel" placeholder="e.g. 3105551234"/>
  <div>
    <button class="btn btn-green" onclick="addProspect()">Add</button>
    <button class="btn btn-gray" onclick="toggleAddForm()">Cancel</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Delete sheet -->

<div class="sheet-backdrop hidden" id="sheet" onclick="handleBackdropTap(event)">
  <div class="sheet" id="sheet-box">
    <p id="sheet-msg">Delete this prospect?</p>
    <button class="sheet-btn sheet-delete" onclick="confirmDelete()">Yes, Delete</button>
    <button class="sheet-btn sheet-cancel" onclick="closeSheet()">Cancel</button>
  </div>
</div>

<script>
const STATUSES=["Not Contacted","Texted","Responded","Not Interested","Interested","Paying Client"];
const COLORS={
  "Not Contacted":{bg:"#1e293b",text:"#94a3b8",dot:"#475569"},
  "Texted":{bg:"#1e3a5f",text:"#7dd3fc",dot:"#38bdf8"},
  "Responded":{bg:"#1e3a2f",text:"#6ee7b7",dot:"#34d399"},
  "Not Interested":{bg:"#3b1e1e",text:"#fca5a5",dot:"#f87171"},
  "Interested":{bg:"#2d2a1e",text:"#fde68a",dot:"#fbbf24"},
  "Paying Client":{bg:"#1a2e1a",text:"#86efac",dot:"#22c55e"},
};
const TEXT_TEMPLATE=`Hey, my name's Ricardo — I run a local lead gen service called SoCal Shine Co. I send homeowners in the LA area who are looking for pressure washing directly to local businesses like yours.\n\nI'm looking to partner with one pressure washing company per area. I'd like to send you a few free leads first so you can see the quality before anything else.\n\nInterested?`;
const DEFAULTS=[
  {id:1,name:"Works Pressure Washing",source:"Yelp",reviews:7,contact:"3103448104",status:"Not Contacted",date:"",notes:"",followup:"",starred:false},
  {id:2,name:"United Pressure Systems",source:"Apple Maps",reviews:8,contact:"",status:"Not Contacted",date:"",notes:"",followup:"",starred:false},
  {id:3,name:"Paver Wash",source:"Apple Maps",reviews:15,contact:"",status:"Not Contacted",date:"",notes:"",followup:"",starred:false},
  {id:4,name:"Cleaning Time Exterior Pressure Wash",source:"Apple Maps",reviews:4,contact:"",status:"Not Contacted",date:"",notes:"",followup:"",starred:false},
  {id:5,name:"Fountain Pressure Washing",source:"Other",reviews:null,contact:"3234792797",status:"Not Contacted",date:"",notes:"",followup:"",starred:false},
  {id:6,name:"Luxe Power Wash",source:"Yelp",reviews:2,contact:"",status:"Not Contacted",date:"",notes:"",followup:"",starred:false},
  {id:7,name:"Splash & Dash Power Wash",source:"Craigslist",reviews:null,contact:"",status:"Not Contacted",date:"",notes:"",followup:"",starred:false},
  {id:8,name:"Pure Wash",source:"Apple Maps",reviews:1,contact:"",status:"Not Contacted",date:"",notes:"",followup:"",starred:false},
  {id:9,name:"PPM Power Wash",source:"Apple Maps",reviews:1,contact:"",status:"Not Contacted",date:"",notes:"",followup:"",starred:false},
];

let prospects=JSON.parse(localStorage.getItem("socal_v3")||"null")||DEFAULTS;
let activeFilter="All";
let deleteTargetId=null;

function save(){localStorage.setItem("socal_v3",JSON.stringify(prospects));}

function showToast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg;t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2000);
}

function getFollowupTag(dateStr){
  if(!dateStr)return"";
  const today=new Date();today.setHours(0,0,0,0);
  const d=new Date(dateStr+"T00:00:00");
  const diff=Math.round((d-today)/(1000*60*60*24));
  let label,overdue=false;
  if(diff<0){label=`Overdue by ${Math.abs(diff)}d`;overdue=true;}
  else if(diff===0){label="Follow up today";}
  else if(diff===1){label="Follow up tomorrow";}
  else{label=`Follow up in ${diff}d`;}
  return`<span class="fu-tag ${overdue?"fu-overdue":"fu-normal"}">${label}</span>`;
}

function cleanPhone(raw){return(raw||"").replace(/\D/g,"");}

function render(){
  let sorted=[...prospects].sort((a,b)=>(b.starred?1:0)-(a.starred?1:0));
  const filtered=activeFilter==="All"?sorted:sorted.filter(p=>p.status===activeFilter);
  document.getElementById("subtext").textContent=`Prospect Tracker · ${prospects.length} businesses`;
  document.getElementById("pill-texted").textContent=prospects.filter(p=>p.status==="Texted").length+" Texted";
  document.getElementById("pill-interested").textContent=prospects.filter(p=>p.status==="Interested").length+" Interested";
  document.getElementById("pill-paying").textContent=prospects.filter(p=>p.status==="Paying Client").length+" Paying Client";
  document.getElementById("filters").innerHTML=["All",...STATUSES].map(s=>`<button class="filter-btn${activeFilter===s?" active":""}" onclick="setFilter('${s}')">${s}</button>`).join("");
  document.getElementById("list").innerHTML=filtered.map(p=>{
    const c=COLORS[p.status];
    const phone=cleanPhone(p.contact);
    const hasPhone=phone.length>=10;
    const fuTag=getFollowupTag(p.followup);
    const actionBtns=hasPhone?`<div class="action-btns"><a href="tel:${phone}" class="action-btn btn-call">📞 Call</a><a href="sms:${phone}" class="action-btn btn-sms">💬 Text</a></div>`:"";
    const quickStatus=`<div class="quick-status">${STATUSES.map(s=>{const sc=COLORS[s];return`<button class="qs-btn${p.status===s?" active-status":""}" style="background:${sc.bg};color:${sc.text};border-color:${sc.dot}60" onclick="quickStatus(${p.id},'${s}')">${s}</button>`;}).join("")}</div>`;
    const safeName=p.name.replace(/\\/g,"\\\\").replace(/'/g,"\\'");
    return`<div class="card${p.starred?" starred":""}" id="card-${p.id}">
      <div class="card-header">
        <div class="card-header-left" onclick="toggleCard(${p.id})">
          <div class="card-name">${p.starred?"⭐ ":""}${p.name}</div>
          <div class="card-meta">${p.source}${p.reviews!==null?" · ⭐ "+p.reviews+" reviews":""}</div>
          ${fuTag}
        </div>
        <div class="card-header-right">
          <span class="badge" style="background:${c.bg};color:${c.text};border-color:${c.dot}40"><span class="dot" style="background:${c.dot}"></span>${p.status}</span>
          <div style="display:flex;gap:8px;align-items:center">
            <button class="star-btn" onclick="toggleStar(${p.id})">${p.starred?"🌟":"☆"}</button>
            <span class="arrow" id="arrow-${p.id}" onclick="toggleCard(${p.id})">▼</span>
          </div>
        </div>
      </div>
      <div class="card-body" id="body-${p.id}">
        ${quickStatus}
        ${actionBtns}
        <button class="btn-copy" onclick="copyTemplate()">📋 Copy Outreach Message</button>
        <div id="view-${p.id}">
          <div class="row"><span class="row-label">Contact: </span><span class="row-val">${p.contact||"—"}</span></div>
          <div class="row"><span class="row-label">Date Texted: </span><span class="row-val">${p.date||"—"}</span></div>
          <div class="row"><span class="row-label">Follow-up: </span><span class="row-val">${p.followup||"—"}</span></div>
          <div class="row"><span class="row-label">Notes: </span><span class="row-val">${p.notes||"—"}</span></div>
          <div class="edit-actions">
            <button class="btn btn-blue" onclick="startEdit(${p.id})">Edit</button>
            <button class="btn btn-red" onclick="promptDelete(${p.id},'${safeName}')">Delete</button>
          </div>
        </div>
        <div style="display:none" id="edit-${p.id}">
          <label>Contact (phone)</label>
          <input type="tel" id="e-contact-${p.id}" value="${p.contact}" placeholder="10-digit number"/>
          <label>Date Texted</label>
          <input id="e-date-${p.id}" value="${p.date}" placeholder="e.g. Apr 16"/>
          <label>Follow-up Date</label>
          <input type="date" id="e-followup-${p.id}" value="${p.followup}"/>
          <label>Notes</label>
          <input id="e-notes-${p.id}" value="${p.notes}" placeholder="Any notes..."/>
          <div class="edit-actions">
            <button class="btn btn-green" onclick="saveEdit(${p.id})">Save</button>
            <button class="btn btn-gray" onclick="cancelEdit(${p.id})">Cancel</button>
          </div>
        </div>
      </div>
    </div>`;
  }).join("");
}

function toggleCard(id){
  const body=document.getElementById("body-"+id);
  const arrow=document.getElementById("arrow-"+id);
  const isOpen=body.classList.contains("open");
  body.classList.toggle("open",!isOpen);
  arrow.textContent=isOpen?"▼":"▲";
}
function toggleStar(id){
  const p=prospects.find(x=>x.id===id);p.starred=!p.starred;
  save();render();showToast(p.starred?"⭐ Starred":"Unstarred");
}
function quickStatus(id,status){
  const p=prospects.find(x=>x.id===id);p.status=status;
  save();render();
  const body=document.getElementById("body-"+id);
  if(body){body.classList.add("open");document.getElementById("arrow-"+id).textContent="▲";}
  showToast("Status updated");
}
function copyTemplate(){
  navigator.clipboard.writeText(TEXT_TEMPLATE).then(()=>showToast("✅ Message copied!")).catch(()=>{
    const ta=document.createElement("textarea");ta.value=TEXT_TEMPLATE;
    document.body.appendChild(ta);ta.select();document.execCommand("copy");
    document.body.removeChild(ta);showToast("✅ Message copied!");
  });
}
function promptDelete(id,name){
  deleteTargetId=id;
  document.getElementById("sheet-msg").textContent=`Delete "${name}"?`;
  document.getElementById("sheet").classList.remove("hidden");
}
function closeSheet(){
  document.getElementById("sheet").classList.add("hidden");
  deleteTargetId=null;
}
function handleBackdropTap(e){
  if(e.target===document.getElementById("sheet"))closeSheet();
}
function confirmDelete(){
  prospects=prospects.filter(p=>p.id!==deleteTargetId);
  save();closeSheet();render();showToast("Deleted");
}
function startEdit(id){document.getElementById("view-"+id).style.display="none";document.getElementById("edit-"+id).style.display="block";}
function cancelEdit(id){document.getElementById("view-"+id).style.display="block";document.getElementById("edit-"+id).style.display="none";}
function saveEdit(id){
  const p=prospects.find(x=>x.id===id);
  p.contact=document.getElementById("e-contact-"+id).value;
  p.date=document.getElementById("e-date-"+id).value;
  p.followup=document.getElementById("e-followup-"+id).value;
  p.notes=document.getElementById("e-notes-"+id).value;
  save();render();
  const body=document.getElementById("body-"+id);
  if(body){body.classList.add("open");document.getElementById("arrow-"+id).textContent="▲";}
  showToast("Saved ✓");
}
function setFilter(s){activeFilter=s;render();}
function toggleAddForm(){document.getElementById("add-form").classList.toggle("hidden");}
function addProspect(){
  const name=document.getElementById("new-name").value.trim();
  if(!name)return;
  prospects.push({id:Date.now(),name,source:document.getElementById("new-source").value,reviews:document.getElementById("new-reviews").value?parseInt(document.getElementById("new-reviews").value):null,contact:document.getElementById("new-contact").value,status:"Not Contacted",date:"",notes:"",followup:"",starred:false});
  save();render();
  document.getElementById("add-form").classList.add("hidden");
  ["new-name","new-source","new-reviews","new-contact"].forEach(id=>document.getElementById(id).value="");
  showToast("Prospect added ✓");
}
render();
</script>

</body>
</html>
